<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta -->
    <title>WrenchBid — Voice-to-Quote for Tradespeople</title>
    <meta name="description" content="Speak the job out loud. WrenchBid builds a professional quote instantly — for HVAC, plumbing, electrical, and more." />
    <meta name="theme-color" content="#e8a020" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/icons/favicon.ico" />

    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="WrenchBid" />

    <style>
      html { background: #0d0d0d; }
    </style>
